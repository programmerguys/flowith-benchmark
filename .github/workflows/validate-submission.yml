name: Validate Benchmark Submission

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

jobs:
  validate:
    if: contains(join(github.event.issue.labels.*.name, ','), 'submission')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate issue payload
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python scripts/validate_submission_issue.py --output validation-result.json

      - name: Apply labels and comment
        uses: actions/github-script@v7
        env:
          VALIDATION_FILE: validation-result.json
        with:
          script: |
            const fs = require('fs')

            const result = JSON.parse(fs.readFileSync(process.env.VALIDATION_FILE, 'utf8'))
            const owner = context.repo.owner
            const repo = context.repo.repo
            const issue_number = context.issue.number
            const marker = '<!-- benchmark-submission-validation -->'
            const statusLabel = result.status_label
            const labelsToEnsure = [
              {
                name: 'submission',
                color: '1d76db',
                description: 'Benchmark submission issue'
              },
              {
                name: 'validated',
                color: '2da44e',
                description: 'Submission passed automated validation'
              },
              {
                name: 'needs-info',
                color: 'd29922',
                description: 'Submission requires fixes or more information'
              }
            ]

            for (const label of labelsToEnsure) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name })
              } catch (error) {
                if (error.status !== 404) throw error
                await github.rest.issues.createLabel({ owner, repo, ...label })
              }
            }

            const currentLabels = context.payload.issue.labels.map(label => label.name)
            const finalLabels = Array.from(
              new Set(
                currentLabels
                  .filter(label => !['validated', 'needs-info'].includes(label))
                  .concat(['submission', statusLabel])
              )
            )

            await github.rest.issues.setLabels({
              owner,
              repo,
              issue_number,
              labels: finalLabels
            })

            const parsed = result.parsed || {}
            const lines = [
              marker,
              '## Submission Validation',
              '',
              `Status: **${result.ok ? 'validated' : 'needs-info'}**`,
              '',
              '### Parsed Submission',
              `- Agent: ${parsed.agent_name || '(missing)'} ${parsed.agent_version || ''}`.trimEnd(),
              `- Benchmark Variant: ${parsed.benchmark_variant || '(missing)'}`,
              `- Protocol Version: ${parsed.protocol_version || '(missing)'}`,
              `- Run ID: ${parsed.run_id || '(missing)'}`,
              `- Total Score: ${parsed.total_score ?? '(missing)'}`,
              `- Pass Rate: ${parsed.pass_rate_percent ?? '(missing)'}%`,
              ''
            ]

            if (result.errors.length > 0) {
              lines.push('### Errors')
              for (const entry of result.errors) lines.push(`- ${entry}`)
              lines.push('')
            }

            if (result.warnings.length > 0) {
              lines.push('### Warnings')
              for (const entry of result.warnings) lines.push(`- ${entry}`)
              lines.push('')
            }

            lines.push('### Next Step')
            lines.push(
              result.ok
                ? '- Automated validation passed. This submission is ready for leaderboard collection.'
                : '- Update this issue with corrected public links or metadata. Editing the issue will re-run validation.'
            )

            const body = lines.join('\n')
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            })

            const existing = comments.find(comment => comment.body && comment.body.includes(marker))

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              })
            }
